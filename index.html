<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Pick</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="app-shell">
        <section class="lotto-panel" aria-labelledby="pageTitle">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Lucky Draw</p>
                    <h1 id="pageTitle">Lotto Pick</h1>
                </div>
                <button class="theme-toggle" id="themeToggle" type="button" aria-label="다크 모드로 전환">
                    <span class="toggle-icon" aria-hidden="true">☀</span>
                    <span id="themeLabel">White</span>
                </button>
            </header>

            <div class="ticket">
                <div class="ticket-header">
                    <span class="ticket-mark">LOTTO</span>
                    <span class="ticket-date" id="drawDate"></span>
                </div>

                <div class="balls" id="mainNumbers" aria-live="polite">
                    <span class="ball placeholder">?</span>
                    <span class="ball placeholder">?</span>
                    <span class="ball placeholder">?</span>
                    <span class="ball placeholder">?</span>
                    <span class="ball placeholder">?</span>
                    <span class="ball placeholder">?</span>
                </div>

                <div class="bonus-row">
                    <span class="plus">+</span>
                    <div class="bonus-ball" id="bonusNumber">?</div>
                    <span class="bonus-label">Bonus</span>
                </div>
            </div>

            <button id="generateBtn" class="generate-button" type="button">번호 뽑기</button>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
