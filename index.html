<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물상 테스트</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <main class="app-shell">
        <section class="tester-panel" aria-labelledby="pageTitle">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Animal Face</p>
                    <h1 id="pageTitle">동물상 테스트</h1>
                </div>
                <button class="theme-toggle" id="themeToggle" type="button" aria-label="다크 모드로 전환">
                    <span class="toggle-icon" aria-hidden="true">Light</span>
                </button>
            </header>

            <div class="test-layout">
                <section class="camera-card" aria-label="카메라 분석">
                    <div class="camera-frame" id="webcam-container">
                        <div class="camera-placeholder" id="cameraPlaceholder">
                            <span class="placeholder-mark">FACE</span>
                        </div>
                    </div>

                    <div class="action-row">
                        <button class="primary-button" id="startBtn" type="button">테스트 시작</button>
                        <button class="secondary-button" id="stopBtn" type="button" disabled>정지</button>
                    </div>

                    <p class="status-text" id="statusText" aria-live="polite">모델을 불러올 준비가 되었습니다.</p>
                </section>

                <section class="result-card" aria-label="분석 결과">
                    <div class="result-hero">
                        <p class="result-label">현재 결과</p>
                        <h2 id="topAnimal">대기 중</h2>
                        <p class="result-caption" id="resultCaption">카메라를 켜면 가장 가까운 동물상이 표시됩니다.</p>
                        <div class="score-ring" id="topScore">0%</div>
                    </div>

                    <div class="prediction-list" id="label-container" aria-live="polite">
                        <div class="empty-state">Start Test를 누르면 동물상 분석 결과가 표시됩니다.</div>
                    </div>
                </section>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
