<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Pick</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="app-shell">
        <section class="lotto-panel" aria-labelledby="pageTitle">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Lucky Draw</p>
                    <h1 id="pageTitle">Lotto Pick</h1>
                </div>
                <button class="theme-toggle" id="themeToggle" type="button" aria-label="다크 모드로 전환">
                    <span class="toggle-icon" aria-hidden="true">☀</span>
                    <span id="themeLabel">Light</span>
                </button>
            </header>

            <div class="controls">
                <label class="switch-control" for="multiGameToggle">
                    <span class="switch-text">5게임 한번에</span>
                    <input id="multiGameToggle" type="checkbox">
                    <span class="switch-track" aria-hidden="true">
                        <span class="switch-thumb"></span>
                    </span>
                </label>
            </div>

            <div class="tickets" id="tickets" aria-live="polite"></div>

            <button id="generateBtn" class="generate-button" type="button">번호 뽑기</button>

            <section class="comments-section" aria-labelledby="commentsTitle">
                <div class="form-heading">
                    <p class="eyebrow">Comments</p>
                    <h2 id="commentsTitle">당첨 소식 나누기</h2>
                </div>
                <div id="disqus_thread"></div>
                <script>
                    /**
                    *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
                    *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables
                    */
                    var disqus_config = function () {
                        this.page.url = window.location.href.split('#')[0];
                        this.page.identifier = 'lotto-pick-comments';
                    };

                    (function() { // DON'T EDIT BELOW THIS LINE
                        var d = document, s = d.createElement('script');
                        s.src = 'https://test-site-wfuvobj7s9.disqus.com/embed.js';
                        s.setAttribute('data-timestamp', +new Date());
                        (d.head || d.body).appendChild(s);
                    })();
                </script>
                <noscript>
                    Please enable JavaScript to view the
                    <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a>
                </noscript>
            </section>

            <form class="contact-form" id="contactForm" action="https://formspree.io/f/maqvaevg" method="POST">
                <div class="form-heading">
                    <p class="eyebrow">Contact</p>
                    <h2>당첨 소식 자랑 및 기부 문의</h2>
                </div>

                <div class="form-grid">
                    <label>
                        <span>이름</span>
                        <input type="text" name="name" autocomplete="name" required>
                    </label>

                    <label>
                        <span>이메일</span>
                        <input type="email" name="email" autocomplete="email" required>
                    </label>
                </div>

                <label>
                    <span>문의 유형</span>
                    <select name="topic" required>
                        <option value="당첨 소식 자랑">당첨 소식 자랑</option>
                        <option value="기부 문의">기부 문의</option>
                        <option value="기타 문의">기타 문의</option>
                    </select>
                </label>

                <label>
                    <span>내용</span>
                    <textarea name="message" rows="4" placeholder="당첨 후기나 기부 관련 문의를 남겨주세요." required></textarea>
                </label>

                <input type="hidden" name="_subject" value="Lotto Pick 문의">
                <button class="submit-button" type="submit">문의 보내기</button>
                <p class="form-status" id="formStatus" aria-live="polite"></p>
            </form>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
