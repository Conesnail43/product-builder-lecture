<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jerry's Test Sandbox</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <main class="app-shell">
        <section class="sandbox-panel" aria-labelledby="pageTitle">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Jerry's Lab</p>
                    <h1 id="pageTitle">Jerry's Test Sandbox</h1>
                </div>
                <button class="theme-toggle" id="themeToggle" type="button" aria-label="다크 모드로 전환">Light</button>
            </header>

            <nav class="feature-nav" aria-label="테스트 기능">
                <button class="nav-button active" type="button" data-target="lottoView">Lotto Pick</button>
                <button class="nav-button" type="button" data-target="animalView">Animal Face</button>
            </nav>

            <section class="feature-view active" id="lottoView" aria-labelledby="lottoTitle">
                <div class="feature-heading">
                    <p class="eyebrow">Lucky Draw</p>
                    <h2 id="lottoTitle">로또 번호 생성기</h2>
                </div>

                <div class="controls">
                    <label class="switch-control" for="multiGameToggle">
                        <span class="switch-text">5게임 한번에</span>
                        <input id="multiGameToggle" type="checkbox">
                        <span class="switch-track" aria-hidden="true">
                            <span class="switch-thumb"></span>
                        </span>
                    </label>
                </div>

                <div class="tickets" id="tickets" aria-live="polite"></div>
                <button id="generateBtn" class="primary-button" type="button">번호 뽑기</button>
            </section>

            <section class="feature-view" id="animalView" aria-labelledby="animalTitle">
                <div class="feature-heading">
                    <p class="eyebrow">Animal Face</p>
                    <h2 id="animalTitle">동물상 테스트</h2>
                </div>

                <div class="test-layout">
                    <section class="camera-card" aria-label="카메라 분석">
                        <div class="camera-frame" id="imageStage">
                            <div class="camera-placeholder" id="cameraPlaceholder">
                                <span class="placeholder-mark">FACE</span>
                            </div>
                            <div id="webcam-container"></div>
                            <img class="preview-image" id="previewImage" alt="분석할 얼굴 사진" hidden>
                        </div>

                        <div class="action-row">
                            <button class="primary-button" id="startBtn" type="button">카메라 켜기</button>
                            <button class="secondary-button" id="captureBtn" type="button" disabled>촬영 분석</button>
                            <button class="secondary-button" id="stopBtn" type="button" disabled>정지</button>
                        </div>

                        <label class="upload-control" for="imageUpload">
                            <span>사진 업로드</span>
                            <input id="imageUpload" type="file" accept="image/*">
                        </label>

                        <canvas id="captureCanvas" width="360" height="360" hidden></canvas>

                        <div class="mode-note">
                            카메라는 실시간으로 결과를 내지 않고, 촬영한 사진 또는 업로드한 사진 한 장으로 분석합니다.
                        </div>

                        <p class="status-text" id="statusText" aria-live="polite">모델을 불러올 준비가 되었습니다.</p>
                    </section>

                    <section class="result-card" aria-label="분석 결과">
                        <div class="result-hero">
                            <p class="result-label">현재 결과</p>
                            <h2 id="topAnimal">대기 중</h2>
                            <p class="result-caption" id="resultCaption">사진을 촬영하거나 업로드하면 가장 가까운 동물상이 표시됩니다.</p>
                            <div class="score-ring" id="topScore">0%</div>
                        </div>

                        <div class="prediction-list" id="label-container" aria-live="polite">
                            <div class="empty-state">카메라로 촬영하거나 사진 파일을 업로드하면 결과가 표시됩니다.</div>
                        </div>
                    </section>
                </div>
            </section>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
